name: Spec Lint

on:
  pull_request:
    paths:
      - v3-sandbox/prototype-api/*.md
      - proposals/hips/*.md
      - scripts/spec_lint.py
      - .spec-lint-ignore
      - .github/workflows/spec-lint.yml
  push:
    branches:
      - main
    paths:
      - v3-sandbox/prototype-api/*.md
      - proposals/hips/*.md
      - scripts/spec_lint.py
      - .spec-lint-ignore
      - .github/workflows/spec-lint.yml

jobs:
  spec-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine changed scoped markdown files
        id: changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi

          FILES="$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" -- 'v3-sandbox/prototype-api/*.md' 'proposals/hips/*.md' | tr '\n' ' ')"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run spec lint
        if: steps.changed.outputs.files != ''
        run: |
          python scripts/spec_lint.py ${{ steps.changed.outputs.files }}

      - name: No relevant file changes
        if: steps.changed.outputs.files == ''
        run: echo "No scoped markdown files changed."
