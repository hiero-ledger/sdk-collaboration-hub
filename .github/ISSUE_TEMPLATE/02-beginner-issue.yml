name: Beginner Issue Template
description: Create a beginner issue for contributors ready to learn the codebase and own a small implementation.
title: "[Beginner]: "
labels: ["beginner"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating a beginner issue!** 😊

        Beginner issues are small, well-scoped tasks to learn the codebase and own a small implementation. 
        
        Read more:
        > [Applying Beginner Label](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/labelling.md)
        > [Issue Progression Initiative](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/README.md)
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍🎓 Beginner Issue
      description: |
        Prefilled introduction to explain what a beginner issue is and who it’s for.
      value : |
        This **[Beginner Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22beginner%22%20OR%20label%3A%22skill%3A%20beginner%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website))** is a small task intended for beginner contributors who have completed good first issues and are ready to learn the codebase and own a small implementation.
        This issue will challenge you to research and learn the patterns in our codebase.

  - type: textarea
    id: task
    attributes:
      label: 👾 Description of the issue
      description: |
        Describe the issue so it is easy for a beginner contributor to understand what needs to be done and why. 
        Include which file(s) to look at, what the current behaviour is, and what the desired behaviour is.
      value: |
        <!-- Describe the issue here -->

    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Solution
      description: |
        Briefly state what the contributor should build or fix. 
        Example: "Add a __repr__ method to AccountId that shows shard, realm, and num."
      value: |
        <!-- State the solution here -->
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: 🔍 Research Pointers
      description: |
        Point the contributor toward relevant files, similar code, docs, or patterns to study.
        This is the "investigate before you code" step.
        Think: what would a colleague tell you if you asked "where do I start?"
        Include links to language documentation if the task involves a language concept.
      value: |
        <!-- Replace this with research pointers. -->
    validations:
      required: true

  - type: textarea
    id: before_you_start
    attributes:
      label: 🐥 Beginner Friendly
      description: |
        This section is pre-filled. Leave as-is unless you need to add issue-specific prerequisites.
      value: |
        Welcome! This Beginner Issue is designed to be a natural next step after good first issues.

        It nudges you to:

        - Research existing patterns
        - Own more implementation decisions
        - Test your changes

        **Difficulty:**

        - Requires knowledge of our workflow
        - Beginner to intermediate Coding skills
        - Beginner DLT/Blockchain experience

        > [!IMPORTANT]
        > We recommend completing at least 3 good first issues before attempting a beginner issue.

        > [!TIP]
        > **You should be comfortable with:**
        > - Forking, branching, committing (with DCO + GPG signing), and opening a pull request without a tutorial
        > - Reading beginner Python code you did not write and following its patterns
        > - Handling simple merge conflicts in CHANGELOG.md
        > - Keeping your fork up to date with main by [rebasing](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developer/rebasing.md)
        > - Looking things up on your own before asking for help

        If any of that feels unfamiliar, good first issues might still be the most rewarding path
        for you right now —
        [find one here](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22good%20first%20issue%22%20OR%20label%3A%22skill%3A%20good%20first%20issue%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website)).
        You can always come back when you are ready.

        **Support:** A maintainer actively monitors this issue and will help guide your implementation ideas.

        ⏱️ Typical time to complete: 4-6 hours
        🧩 Difficulty: Manageable but requires investigation and testing
        🎓 Best for: Beginner contributors

        ---

        🏁 **When this issue is complete, you will have:**

        ✅ Improved your research abilities
        ✅ Improved your knowledge of the codebase
        ✅ Owned implementation decisions
        ✅ Created basic tests

  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing your changes
      description: |
        Edit or add testing requirements specific to this issue.
      value: |
        How you test depends on the type of change.
        See the [testing guide](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/testing.md) for full details.

        **Source code changes (in `src/`):**
        - Write unit tests and run them locally: `uv run pytest tests/unit/<specific_file>_test.py -v`
        - Integration tests will run automatically when you push to your fork or open a PR

        **Example script changes (e.g. in `examples/`):**
        - Run the example script to confirm it works: instructions are at the top of each script
        - You will need a [Hedera Portal](https://portal.hedera.com/) account for testnet credentials — see [environment setup](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/training/setup/environment_setup.md)
        - Example changes do not require unit or integration tests

        **Workflow / GitHub Actions changes (e.g. files in `.github/`):**
        - Where possible, test by merging to your fork's `main` and simulating the scenario (e.g. creating a test issue or PR)
        - Link to any test issues or PRs you created as evidence
        - See the [workflow testing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/github-action-workflows.md)

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ Done Checklist
      description: |
        Edit or add acceptance criteria specific to this issue. 
        These are the requirements that must be met for a PR to be considered complete. The defaults cover the standard requirements for a beginner issue, but feel free to add any issue-specific criteria.
      value: |
        Before opening your PR, confirm:

        - [ ] My changes address what the issue asked for — nothing more, nothing less
        - [ ] I tested my changes locally (if relevant — see testing section above)
        - [ ] My commits are signed: `git commit -S -s -m "chore: description"` — [Signing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/signing.md)
        - [ ] I added a CHANGELOG.md entry under `[Unreleased]` — [Changelog guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/docs/changelog-guide.md)
        - [ ] All CI checks pass

  - type: textarea
    id: contribution_steps
    attributes:
      label: 📋 Workflow quick reference
      description: |
        PRE-FILLED REFERENCE TABLE. LEAVE AS-IS.
      value: |
        You have done this before — here are the links if you need them:

        | Step | Guide |
        |------|-------|
        | Claim this issue | Comment `/assign` below |
        | Sync with main | [Rebasing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/rebasing.md) |
        | Open a PR and link this issue | [PR guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/contributor-workflow.md) · [Linking guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/contributor-workflow.md) |
        | Resolve merge conflicts | [Merge conflicts guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/merge_conflicts.md) |

  - type: textarea
    id: ai_tips
    attributes:
      label: 🤖 Tips for using AI tools
      description: |
        Pre-filled guidance.
      value: |
        Here is how to get the most out of AI tools:

        - Use AI to understand the issue and the codebase, not to write code for you.
        - Build your solution in small steps — add print statements or logs to confirm each piece works before moving on
        - If AI output and SDK patterns disagree, trust the SDK

  - type: textarea
    id: stuck
    attributes:
      label: 🆘 Stuck?
      description: |
        Pre-filled guidance.
      value: |
        Beginner issues can be tricky — it is completely normal to get blocked. Here is what to do:

        - **Comment on this issue** and describe what you have tried. A maintainer will respond.
        - **Ask on [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/discord.md)**
        - **Join [Office Hours](https://zoom-lfx.platform.linuxfoundation.org/meeting/99912667426?password=5b584a0e-1ed7-49d3-b2fc-dc5ddc888338)** (Wednesdays, 2pm UTC) for live, hands-on help with a maintainer — screen sharing welcome.

        Do not spend more than 30 minutes blocked without asking. Asking good questions is a skill too.
  
  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources
      description: |
        ADD ANY TASK-SPECIFIC RESOURCES BELOW — RELEVANT DOCS, STACK OVERFLOW ANSWERS, OR SPECIFIC FILES IN THE CODEBASE.
      value: |
        **Project references:**
        - [Project structure](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/docs/sdk_developers/training/setup/project_structure.md)
        - [CONTRIBUTING.md](https://github.com/hiero-ledger/hiero-sdk-python/blob/main/CONTRIBUTING.md)
        - [Browse closed beginner PRs](https://github.com/hiero-ledger/hiero-sdk-python/pulls?q=is%3Apr+is%3Amerged+label%3Abeginner) — see how others did it

        **Python references:**
        - [Python official docs](https://docs.python.org/3/)
        - [Data model (dunder methods)](https://docs.python.org/3/reference/datamodel.html)
        - [Type hints](https://docs.python.org/3/library/typing.html)
